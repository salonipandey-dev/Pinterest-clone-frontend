<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Clone</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>

<body>

<!-- Header -->
<header class="header">

    <div class="logo">
        Pinterest
    </div>

    <input type="text" placeholder="Search..." class="search-bar">

    <div class="nav-bar">
        <button class="login-btn">Log In</button>
       <button class="signup-btn">Sign Up</button>
    </div>

</header>


<!-- Main Content -->
<main class="main">

    <div class="grid">

        <!-- Pin Card 1 -->
        <div class="pin-card">
            <img src="https://via.placeholder.com/300x400" alt="Pin Image">

            <div class="pin-info">
                <button class="save-button">Save</button>
                <p class="pin-description">
                    This is a sample pin description.
                </p>
            </div>
        </div>


        <!-- Pin Card 2 -->
        <div class="pin-card">
            <img src="https://via.placeholder.com/300x400" alt="Pin Image">

            <div class="pin-info">
                <button class="save-button">Save</button>
                <p class="pin-description">
                    Another sample pin description.
                </p>
            </div>
        </div>


        <!-- Pin Card 3 -->
        <div class="pin-card">
            <img src="https://via.placeholder.com/300x500" alt="Pin Image">

            <div class="pin-info">
                <button class="save-button">Save</button>
                <p class="pin-description">
                    Pinterest style tall image card.
                </p>
            </div>
        </div>

    </div>

</main>

</body>
</html>
